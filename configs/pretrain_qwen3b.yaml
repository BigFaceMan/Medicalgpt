# Pretraining Config for Qwen2.5-0.5B
model_name_or_path: Qwen/Qwen2.5-0.5B
train_file_dir: ./data/tianlongbabu
validation_file_dir: ./data/tianlongbabu
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
do_train: true
do_eval: true
use_peft: true
seed: 42
max_train_samples: 10000
max_eval_samples: 10
num_train_epochs: 30
learning_rate: 2e-4
warmup_steps: 5
weight_decay: 0.01
logging_strategy: steps
logging_steps: 10
eval_steps: 50
eval_strategy: steps
save_steps: 500
save_strategy: steps
save_total_limit: 13
gradient_accumulation_steps: 8
preprocessing_num_workers: 10
block_size: 512
packing: true
output_dir: outputs-pt-qwen-v1
ddp_timeout: 30000
logging_first_step: true
target_modules: all
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
torch_dtype: bfloat16
bf16: true
report_to: swanlab
run_name: md-qw0.5-pt
ddp_find_unused_parameters: false
gradient_checkpointing: true
cache_dir: ./cache

# SFT Training Config with Accelerate for Qwen2.5-3B
model_name_or_path: Qwen/Qwen2.5-3B-instruct
train_file_dir: /lfs3/users/spsong/dataset/LLMData/finetune/train
validation_file_dir: /lfs3/users/spsong/dataset/LLMData/finetune/valid
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 2
do_train: true
do_eval: true
template_name: qwen
use_peft: true
max_train_samples: 50000
max_eval_samples: -1
validation_split_percentage: 10
model_max_length: 4096
num_train_epochs: 2
learning_rate: 2e-5
warmup_steps: 50
weight_decay: 0.05
logging_strategy: steps
logging_steps: 5
eval_steps: 200
eval_strategy: steps
save_steps: 500
save_strategy: steps
save_total_limit: 13
preprocessing_num_workers: 4
output_dir: ./output/qwen3B-instruct-sft-accelerate
logging_first_step: true
target_modules: all
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
torch_dtype: bfloat16
bf16: true
report_to: swanlab
run_name: qwen3B-instruct-sft-accelerate
gradient_checkpointing: true
cache_dir: ./cache
flash_attn: true
